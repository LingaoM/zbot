# =============================================================================
# ZephyrClaw - Zephyr AI Agent Configuration
# Target: nRF7002-DK (nRF5340 + nRF7002 WiFi)
# =============================================================================

# --- Kernel / Stack ---
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=32768

CONFIG_PRINTK=y

# --- Shell (for runtime key configuration) ---
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_SHELL_CMD_BUFF_SIZE=512
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_HISTORY_BUFFER=512

# --- Networking ---
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
# NOTE: CONFIG_NET_SOCKETS_POSIX_NAMES is deprecated since Zephyr 3.7.
# Socket calls use the zsock_* prefix directly (no POSIX_API needed).
# See: zephyr/doc/releases/migration-guide-3.7.rst #69950
CONFIG_DNS_RESOLVER=y
# Use DHCP-assigned DNS so internal domains resolve.
CONFIG_DNS_SERVER_IP_ADDRESSES=n

# --- Network buffers ---
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
# NET_BUF_DATA_SIZE depends on NET_BUF_FIXED_DATA_SIZE; enable the guard first.
CONFIG_NET_BUF_FIXED_DATA_SIZE=y
CONFIG_NET_BUF_DATA_SIZE=256

# --- WiFi (nRF7002) ---
# WIFI_NRF7002 is auto-selected by DT (DT_HAS_NORDIC_NRF7002_QSPI_ENABLED).
# WIFI_NM_WPA_SUPPLICANT is auto-selected by the nrf_wifi driver.
# Do NOT set WIFI_NRF700X or WPA_SUPP — those symbols no longer exist.
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_DHCPV4=y
# WiFi shell: enables the "wifi" command (connect/disconnect/scan/status).
# Automatically selects NET_L2_WIFI_MGMT, NET_L2_WIFI_UTILS, SHELL_GETOPT.
CONFIG_NET_L2_WIFI_SHELL=y

# --- HTTP Client ---
CONFIG_HTTP_CLIENT=y

# --- TLS / mbedTLS ---
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
# MBEDTLS_HEAP_SIZE lives inside "if MBEDTLS_ENABLE_HEAP"
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=32768
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=8192
# TLS 1.2 ciphersuite — required to pull in the SSL module (mbedtls_ssl_*).
# Without at least one ciphersuite, MBEDTLS_SSL_PROTO_TLS1_2 is never selected
# and all mbedtls_ssl_init/setup/handshake/... symbols are absent at link time.
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256=y

# --- WiFi Credentials (Zephyr built-in, uses SETTINGS+NVS backend) ---
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y

CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_SETTINGS_NVS=y

CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# --- JSON parser ---
CONFIG_JSON_LIBRARY=y

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
# Use immediate (synchronous) log mode so output appears right away on UART,
# even before the shell thread is fully initialised. The default deferred mode
# queues messages into the shell log backend which only flushes once the shell
# is running — causing all early boot logs to be silently dropped.
CONFIG_LOG_MODE_IMMEDIATE=y

# --- Entropy / RNG ---
# nRF5340 app core has no RNG peripheral in its DTS. The psa-crypto-rng driver
# crashes at PRE_KERNEL_1 (heap not ready). Instead:
#   - TEST_RANDOM_GENERATOR: allows a non-CSPRNG source to satisfy sys_rand_get
#   - TIMER_RANDOM_GENERATOR: provides z_impl_sys_rand_get via system timer
#     (sufficient for TCP ISN and DHCP; not used for TLS key material)
# TLS/mbedTLS crypto RNG is provided by MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG
# which is already set in the board defconfig and uses the software PSA backend.
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y

# --- Reboot support ---
CONFIG_REBOOT=y
