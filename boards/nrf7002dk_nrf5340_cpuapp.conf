# nRF7002-DK specific Kconfig overrides
# This file supplements prj.conf for the nRF7002-DK board target.

# nRF7002 WiFi driver
# WIFI_NRF7002 is auto-selected via DT — do not set manually.
# NRF700X_QSPI_4_MHZ_CLOCK no longer exists; use NRF70_QSPI_LOW_POWER instead.
CONFIG_NRF70_QSPI_LOW_POWER=n

# nRF5340 specific settings
CONFIG_ARM_MPU=y
CONFIG_HW_STACK_PROTECTION=y

# DHCP for WiFi
CONFIG_NET_DHCPV4=y

# Increase network management thread stack for WPA supplicant
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096

# Flash for NVS (internal flash on nRF5340)
CONFIG_SOC_FLASH_NRF=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Shell over UART
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
