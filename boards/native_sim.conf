# =============================================================================
# zbot - Board-specific config for native_sim (Linux host simulation)
# =============================================================================

# --- Native networking (offloaded sockets via host stack) ---
# Use the native Linux network stack via offloaded socket API.
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NET_DHCPV4=y

CONFIG_TEST_RANDOM_GENERATOR=y

# --- POSIX / libc ---
# native_sim provides a full libc; enable POSIX API for compatibility.
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_POSIX_API=y

# Optional but recommended for native_sim + nsos
CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_IPV6_DAD=n

CONFIG_MBEDTLS_HASH_ALL_ENABLED=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_ECP_ALL_ENABLED=y

# --- GPIO emulation ---
# gpio_emul driver is auto-selected by the DTS compatible "zephyr,gpio-emul".
# Explicitly enable it here as a safety net.
CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y

# Debug
CONFIG_NET_LOG=y